name: Update Medium posts

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update-medium-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Medium feed
        run: node scripts/update-medium-posts.mjs

      - name: Commit updated Medium posts
        run: |
          if git diff --quiet -- data/medium-posts.json; then
            echo "No Medium post updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/medium-posts.json
          git commit -m "Update Medium posts"
          git push
